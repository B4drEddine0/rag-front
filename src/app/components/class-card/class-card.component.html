<div class="class-card">
  <div class="class-card__accent"></div>

  <div class="class-card__head">
    <div class="class-card__icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" class="w-11 h-11">
        <rect x="8" y="12" width="48" height="40" rx="6" fill="currentColor" opacity="0.15"/>
        <path d="M16 20h32M16 28h24M16 36h28" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <circle cx="48" cy="44" r="8" fill="currentColor" opacity="0.2"/>
        <path d="M45 44l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div class="min-w-0">
      <h3 class="class-card__title">{{ name }}</h3>
      <span class="class-card__grade">{{ grade }}</span>
    </div>
  </div>

  <div class="class-card__stats">
    <article>
      <span>Students</span>
      <strong>{{ studentsCount }}</strong>
    </article>
    <article>
      <span>Teachers</span>
      <strong>{{ teachersCount }}</strong>
    </article>
    <article>
      <span>Resources</span>
      <strong>{{ resourcesCount }}</strong>
    </article>
  </div>

  <div class="class-card__footer">
    @if (showDetailsAction) {
      <a [routerLink]="['/classes', classId]" class="class-card__cta no-underline">
        View Details
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
        </svg>
      </a>
    }
    @if (showAdminActions) {
      <div class="class-card__admin-actions">
        <button type="button" class="class-card__btn class-card__btn--edit" (click)="onEdit($event)">Edit</button>
        <button type="button" class="class-card__btn class-card__btn--delete" (click)="onDelete($event)">Delete</button>
      </div>
    }
  </div>
</div>
