<div class="resource-card">
  <div class="resource-card__head">
    <div class="resource-card__icon" [class.resource-card__icon--official]="type === 'official'">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
      </svg>
    </div>
    <div class="min-w-0">
      <h3 class="resource-card__title">{{ title }}</h3>
      <span class="resource-card__type" [class.resource-card__type--official]="type === 'official'">
        {{ type === 'official' ? 'Official' : 'Non-official' }}
      </span>
    </div>
  </div>

  <p class="resource-card__description">{{ description }}</p>

  <div class="resource-card__meta">
    <span>
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
      </svg>
      {{ uploadedBy }}
    </span>
    <span>
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
      </svg>
      {{ date }}
    </span>
  </div>

  <div class="resource-card__actions">
    <button type="button" class="resource-card__btn resource-card__btn--view" (click)="viewClicked.emit()">
      View file
    </button>
    @if (showDelete) {
      <button type="button" class="resource-card__btn resource-card__btn--delete" (click)="deleteClicked.emit()">
        Delete
      </button>
    }
  </div>
</div>
