<div class="stat-card flex items-center gap-4 p-5 bg-white rounded-2xl border border-slate-200 shadow-sm transition-shadow">
  <div class="flex items-center justify-center w-14 h-14 rounded-xl shrink-0"
       [style.background]="color + '1a'" [style.color]="color" [innerHTML]="safeIcon">
  </div>
  <div class="flex flex-col">
    <span class="text-2xl font-bold text-slate-900">{{ value }}</span>
    <span class="text-sm text-slate-500 mt-0.5">{{ label }}</span>
  </div>
</div>
